id = "pk.pi-speak"
name = "Pi Speak"
version = "0.2.0"
min_herdr_version = "0.7.0"
description = "Pi Speak phone, voice, and routing helpers for Herdr panes"
platforms = ["linux", "macos", "windows"]


[[actions]]
id = "speak-selection"
title = "Speak selected text"
contexts = ["pane", "selection", "link"]
command = ["node", "index.cjs", "speak-selection"]

[[actions]]
id = "route-current-pane"
title = "Mark current pane as Pi Speak route target"
contexts = ["pane"]
command = ["node", "index.cjs", "route-current-pane"]

[[panes]]
id = "mobile"
title = "Pi Speak mobile setup"
placement = "overlay"
command = ["pk-speak", "mobile"]

[[panes]]
id = "doctor"
title = "Pi Speak doctor"
placement = "overlay"
command = ["pk-speak", "doctor"]

[[panes]]
id = "gateway"
title = "Pi Speak gateway"
placement = "tab"
command = ["pk-speak", "gateway"]

# --- Agent Hub panes (interactive => panes, never actions) ---

[[panes]]
id = "agent-hub"
title = "oh-my-pi Agent Hub"
placement = "tab"
command = ["node", "index.cjs", "pane:agent-hub"]

[[panes]]
id = "agent-chat"
title = "Agent transcript"
placement = "overlay"
command = ["node", "index.cjs", "pane:agent-chat"]

[[panes]]
id = "agent-stream"
title = "Agent live stream"
placement = "tab"
command = ["node", "index.cjs", "pane:agent-stream"]
