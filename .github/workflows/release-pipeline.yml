name: Release Pipeline

# Runs the stable release flow (just release-prepare + release-publish) on a
# hosted Unix runner so releases do not depend on a locally provisioned
# machine. The tag is pushed with KANGAL_GITHUB_TOKEN so the tag push
# triggers the Release workflow that builds and publishes binaries.

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable version to release (e.g. 0.8.0, no v prefix)
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-pipeline
  cancel-in-progress: false

jobs:
  prepare-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: master
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Rust tools
        uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25 # v2.81.9
        with:
          tool: just,cargo-nextest

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.15.2

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-bin: false
          key: release-pipeline

      # release-prepare runs `cargo update -p herdr --offline`; a pristine
      # runner has no registry index, so prime the cargo cache first.
      - name: Fetch cargo dependencies
        run: cargo fetch --locked

      - name: Prepare release commit
        run: |
          set -euo pipefail
          git status --porcelain
          git config user.name "kangal-bot"
          git config user.email "285672167+kangal-bot@users.noreply.github.com"
          just release-prepare "${{ inputs.version }}"

      - name: Publish release commit and tag
        env:
          KANGAL_GITHUB_TOKEN: ${{ secrets.KANGAL_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git status --porcelain
          git remote set-url origin "https://x-access-token:${KANGAL_GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          just release-publish "${{ inputs.version }}"
